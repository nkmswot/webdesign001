<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>HTML & CSS Learning Playground | WebDesign001</title>
<meta name="description" content="Free interactive HTML and CSS playground for beginners. 12 guided lessons teaching HTML tags, CSS styling, Flexbox, Grid, animations and more. Learn by doing."/>
<link rel="canonical" href="https://webdesign001.net/html-css-playground.html"/>
<link rel="icon" type="image/x-icon" href="/favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#060b14;color:#dde8f8;min-height:100vh;-webkit-font-smoothing:antialiased;overflow:hidden;}
a{text-decoration:none;color:inherit;}
:root{--bg:#060b14;--surface:#0b1220;--card:#0e1628;--border:#162035;--border-hover:#2a3f60;--text:#dde8f8;--muted:#4a6080;--accent:#6366f1;--accent2:#8b5cf6;--accent3:#ec4899;}

/* ── Nav ── */
.top-bar{height:52px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:100;}
.logo{font-weight:800;font-size:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap;}
.top-bar a.back{font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:4px 12px;transition:all .15s;margin-right:4px;}
.top-bar a.back:hover{border-color:var(--border-hover);color:var(--text);}

/* ── Lesson tabs ── */
.lesson-bar{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1;}
.lesson-bar::-webkit-scrollbar{display:none;}
.ltab{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;border:1px solid transparent;color:var(--muted);background:none;font-family:inherit;transition:all .15s;}
.ltab:hover{color:var(--text);}
.ltab.on{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:#818cf8;}

/* ── Layout ── */
.main{display:grid;grid-template-columns:280px 1fr 1fr;height:calc(100vh - 52px);}
@media(max-width:900px){.main{grid-template-columns:1fr;height:auto;overflow-y:auto;}
.preview-col{height:300px;}}

/* ── Lesson sidebar ── */
.lesson-col{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.lesson-head{padding:16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.lesson-num{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.lesson-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:8px;}
.lesson-body{font-size:12px;line-height:1.75;color:var(--muted);overflow-y:auto;flex:1;padding:16px;}
.lesson-body h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 0 6px;}
.lesson-body p{margin-bottom:10px;}
.lesson-body code{background:#070e1c;border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#c8d9ef;}
.lesson-body pre{background:#070e1c;border:1px solid var(--border);border-radius:6px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#c8d9ef;overflow-x:auto;margin:8px 0;line-height:1.65;}
.lesson-body .tip{background:rgba(99,102,241,.08);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;padding:8px 12px;margin:10px 0;font-size:11px;color:#818cf8;}
.lesson-body .warning{background:rgba(251,191,36,.08);border-left:3px solid #fbbf24;border-radius:0 6px 6px 0;padding:8px 12px;margin:10px 0;font-size:11px;color:#fbbf24;}
.lesson-body ul{padding-left:16px;margin-bottom:10px;}
.lesson-body ul li{margin-bottom:4px;}
.lesson-nav{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.lnav-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.lnav-btn:hover{border-color:var(--border-hover);color:var(--text);}
.lnav-btn.pri{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:transparent;color:#fff;}
.progress-bar{height:3px;background:var(--border);}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#ec4899);transition:width .4s;}
.badge-done{display:inline-block;background:rgba(52,211,153,.15);color:#34d399;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:6px;}

/* ── Code editor ── */
.editor-col{background:#060b14;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.editor-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0;}
.etab{padding:10px 18px;font-size:12px;font-weight:700;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);transition:all .15s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;}
.etab.on{color:var(--accent);border-bottom-color:var(--accent);}
.etab:hover{color:var(--text);}
.editor-actions{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.ed-btn{padding:4px 12px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.ed-btn:hover{border-color:var(--border-hover);color:var(--text);}
.ed-btn.run{background:linear-gradient(135deg,#6366f1,#8b5cf6);border-color:transparent;color:#fff;}
.code-area{flex:1;width:100%;padding:14px;color:#c8d9ef;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.75;resize:none;outline:none;border:none;background:#060b14;overflow-y:auto;}
.code-area:focus{outline:none;}
.line-count{font-size:10px;color:var(--muted);padding:4px 10px;border-top:1px solid var(--border);flex-shrink:0;font-family:'JetBrains Mono',monospace;}

/* ── Preview ── */
.preview-col{display:flex;flex-direction:column;overflow:hidden;}
.preview-head{padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.preview-dots{display:flex;gap:5px;}
.preview-dot{width:10px;height:10px;border-radius:50%;}
.preview-frame{flex:1;border:none;background:#fff;}
.console-area{height:80px;border-top:1px solid var(--border);background:#070e1c;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#86efac;overflow-y:auto;flex-shrink:0;}
.console-area .err{color:#f87171;}
.console-area .info{color:#818cf8;}

/* confetti */
@keyframes confFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.conf{position:fixed;pointer-events:none;z-index:9999;width:8px;height:8px;border-radius:2px;animation:confFall 1.5s ease-in forwards;}
</style>
</head><body>

<div class="top-bar">
  <a class="back" href="index.html">← Home</a>
  <span class="logo">&#9670; WebDesign001</span>
  <div class="lesson-bar" id="lessonBar"></div>
  <span style="font-size:11px;color:var(--muted);white-space:nowrap;margin-left:8px;"><span id="progressTxt">0/0</span> done</span>
</div>

<div class="main">
  <!-- LESSON SIDEBAR -->
  <div class="lesson-col">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="lesson-head">
      <div class="lesson-num" id="lessonNum">Lesson 1 of 12</div>
      <div class="lesson-title" id="lessonTitle">Welcome</div>
    </div>
    <div class="lesson-body" id="lessonBody"></div>
    <div class="lesson-nav">
      <button class="lnav-btn" id="prevBtn" onclick="prevLesson()">← Prev</button>
      <button class="lnav-btn pri" id="nextBtn" onclick="nextLesson()">Next →</button>
    </div>
  </div>

  <!-- CODE EDITOR -->
  <div class="editor-col">
    <div class="editor-tabs">
      <button class="etab on" id="etab-html" onclick="switchTab('html')">HTML</button>
      <button class="etab" id="etab-css" onclick="switchTab('css')">CSS</button>
    </div>
    <div class="editor-actions">
      <button class="ed-btn run" onclick="runCode()">▶ Run</button>
      <button class="ed-btn" onclick="resetCode()">↺ Reset</button>
      <button class="ed-btn" onclick="copyCode()">⎘ Copy</button>
      <span style="margin-left:auto;font-size:11px;color:var(--muted)">Auto-run on change</span>
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;">
        <input type="checkbox" id="autoRun" checked style="accent-color:var(--accent)"/>
      </label>
    </div>
    <textarea class="code-area" id="htmlEditor" spellcheck="false" oninput="onEdit()"></textarea>
    <textarea class="code-area" id="cssEditor" spellcheck="false" oninput="onEdit()" style="display:none"></textarea>
    <div class="line-count" id="lineCount">Line 1, Col 1</div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-col">
    <div class="preview-head">
      <div class="preview-dots">
        <div class="preview-dot" style="background:#f87171"></div>
        <div class="preview-dot" style="background:#fbbf24"></div>
        <div class="preview-dot" style="background:#34d399"></div>
      </div>
      <span style="font-size:11px;color:var(--muted)">Live Preview</span>
      <button class="ed-btn" onclick="openFull()" style="margin-left:auto;font-size:10px">⤢ Full</button>
    </div>
    <iframe id="previewFrame" class="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
    <div class="console-area" id="consoleArea"><span class="info">// Console output appears here</span></div>
  </div>
</div>

var LESSONS = [

var curLesson = 0;
var curTab = 'html';
var done = {};
var autoRunTimer = null;

function buildLessonBar() {
  var bar = document.getElementById('lessonBar');
  LESSONS.forEach(function(l, i) {
    var btn = document.createElement('button');
    btn.className = 'ltab' + (i === 0 ? ' on' : '');
    btn.id = 'ltab_' + i;
    btn.textContent = (i+1) + '. ' + l.title;
    btn.onclick = function(){ goLesson(i); };
    bar.appendChild(btn);
  });
}

function goLesson(idx) {
  curLesson = idx;
  var l = LESSONS[idx];
  document.querySelectorAll('.ltab').forEach(function(b){ b.classList.remove('on'); });
  var tab = document.getElementById('ltab_' + idx);
  if (tab) { tab.classList.add('on'); tab.scrollIntoView({inline:'nearest',block:'nearest'}); }
  document.getElementById('lessonNum').textContent = 'Lesson ' + (idx+1) + ' of ' + LESSONS.length;
  document.getElementById('lessonTitle').innerHTML = l.title + (done[idx] ? '<span class="badge-done">✓ Done</span>' : '');
  document.getElementById('lessonBody').innerHTML = l.body + (idx === LESSONS.length-1 ? '<br><button class="lnav-btn pri" style="width:100%;margin-top:12px" onclick="completeAll()">🎉 Complete!</button>' : '');
  document.getElementById('htmlEditor').value = l.html;
  document.getElementById('cssEditor').value = l.css;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').textContent = idx === LESSONS.length-1 ? 'Finish 🎉' : 'Next →';
  updateProgress();
  runCode();
}

function prevLesson() { if (curLesson > 0) goLesson(curLesson-1); }
function nextLesson() {
  done[curLesson] = true;
  updateProgress();
  if (curLesson < LESSONS.length-1) goLesson(curLesson+1);
  else completeAll();
}

function updateProgress() {
  var n = Object.keys(done).length;
  var total = LESSONS.length;
  document.getElementById('progressFill').style.width = (n/total*100) + '%';
  document.getElementById('progressTxt').textContent = n + '/' + total;
  if (done[curLesson]) {
    document.getElementById('lessonTitle').innerHTML = LESSONS[curLesson].title + '<span class="badge-done">✓ Done</span>';
  }
}

function switchTab(tab) {
  curTab = tab;
  document.getElementById('htmlEditor').style.display = tab === 'html' ? '' : 'none';
  document.getElementById('cssEditor').style.display = tab === 'css' ? '' : 'none';
  document.getElementById('etab-html').classList.toggle('on', tab === 'html');
  document.getElementById('etab-css').classList.toggle('on', tab === 'css');
}

function runCode() {
  var html = document.getElementById('htmlEditor').value;
  var css = document.getElementById('cssEditor').value;
  var doc = '<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>' + css + '</style></head><body>' + html + '</body></html>';
  var frame = document.getElementById('previewFrame');
  var blob = new Blob([doc], {type:'text/html'});
  var url = URL.createObjectURL(blob);
  frame.onload = function(){ try { URL.revokeObjectURL(url); } catch(e){} };
  frame.src = url;
}

function onEdit() {
  if (!document.getElementById('autoRun').checked) return;
  clearTimeout(autoRunTimer);
  autoRunTimer = setTimeout(runCode, 600);
  var editor = curTab === 'html' ? document.getElementById('htmlEditor') : document.getElementById('cssEditor');
  var lines = editor.value.substr(0, editor.selectionStart).split('\n');
  document.getElementById('lineCount').textContent = 'Line ' + lines.length + ', Col ' + lines[lines.length-1].length;
}

function resetCode() {
  var l = LESSONS[curLesson];
  document.getElementById('htmlEditor').value = l.html;
  document.getElementById('cssEditor').value = l.css;
  runCode();
}

function copyCode() {
  var editor = curTab === 'html' ? document.getElementById('htmlEditor') : document.getElementById('cssEditor');
  navigator.clipboard.writeText(editor.value);
}

function openFull() {
  var html = document.getElementById('htmlEditor').value;
  var css = document.getElementById('cssEditor').value;
  var doc = '<!DOCTYPE html><html><head><meta charset="UTF-8"/><style>' + css + '</style></head><body>' + html + '</body></html>';
  var blob = new Blob([doc], {type:'text/html'});
  window.open(URL.createObjectURL(blob));
}

function completeAll() {
  done = {};
  LESSONS.forEach(function(_, i){ done[i] = true; });
  updateProgress();
  confetti();
  setTimeout(function(){
    document.getElementById('consoleArea').innerHTML = '<span class="info">🎉 Congratulations! You have completed the HTML & CSS playground! Keep building amazing things.</span>';
  }, 300);
}

function confetti() {
  var colors = ['#6366f1','#8b5cf6','#ec4899','#14b8a6','#f59e0b','#34d399'];
  for (var i = 0; i < 80; i++) {
    (function(i) {
      setTimeout(function() {
        var el = document.createElement('div');
        el.className = 'conf';
        el.style.left = Math.random() * 100 + 'vw';
        el.style.top = '-10px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (0.8 + Math.random() * 1.2) + 's';
        el.style.animationDelay = (Math.random() * 0.5) + 's';
        el.style.transform = 'rotate(' + Math.random()*360 + 'deg)';
        document.body.appendChild(el);
        setTimeout(function(){ el.remove(); }, 2500);
      }, i * 20);
    })(i);
  }
}

buildLessonBar();
goLesson(0);

</script>
</body></html>
